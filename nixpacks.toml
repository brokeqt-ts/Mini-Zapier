[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npm run build:shared",
  "cd backend && npx prisma generate && npx nest build",
  "npm run build:frontend"
]

[start]
cmd = "cd backend && npx prisma migrate deploy && node dist/main"
